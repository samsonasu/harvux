<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#3584e4" />
  <!-- Clock face -->
  <circle cx="64" cy="64" r="48" fill="#ffffff" />
  <!-- Hour marks -->
  <rect x="62" y="20" width="4" height="12" rx="2" fill="#3584e4" />
  <rect x="62" y="96" width="4" height="12" rx="2" fill="#3584e4" />
  <rect x="20" y="62" width="12" height="4" rx="2" fill="#3584e4" />
  <rect x="96" y="62" width="12" height="4" rx="2" fill="#3584e4" />
  <!-- Hour hand -->
  <line x1="64" y1="64" x2="64" y2="38" stroke="#1c71d8" stroke-width="5" stroke-linecap="round" />
  <!-- Minute hand -->
  <line x1="64" y1="64" x2="88" y2="50" stroke="#1c71d8" stroke-width="3" stroke-linecap="round" />
  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="#1c71d8" />
</svg>
