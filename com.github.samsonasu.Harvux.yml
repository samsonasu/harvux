app-id: com.github.samsonasu.Harvux
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: harvux
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.secrets
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/harvux/cargo
modules:
  - name: harvux
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release
      - install -Dm755 target/release/harvux /app/bin/harvux
      - install -Dm644 data/com.github.samsonasu.Harvux.desktop /app/share/applications/com.github.samsonasu.Harvux.desktop
      - install -Dm644 data/com.github.samsonasu.Harvux.metainfo.xml /app/share/metainfo/com.github.samsonasu.Harvux.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/com.github.samsonasu.Harvux.svg /app/share/icons/hicolor/scalable/apps/com.github.samsonasu.Harvux.svg
    sources:
      - type: dir
        path: .
      - cargo-sources.json
